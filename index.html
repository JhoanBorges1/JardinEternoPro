<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kiara - Universe</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;600&family=Playfair+Display:ital,wght@1,400;1,700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/addons/p5.sound.min.js"></script>

    <style>
        :root {
            --primary: #d4a017;
            --accent: #FFD700;
            --glass: rgba(255, 255, 255, 0.15);
            --dark-text: #5d4037;
            --bg-ultra: linear-gradient(135deg, #fff9e3 0%, #ffe4b5 50%, #ffd194 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-ultra);
            color: var(--dark-text);
            overflow: hidden;
            height: 100vh;
        }

        /* App Shell */
        #app-interface {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
        }

        #app-interface.active { opacity: 1; pointer-events: auto; }

        /* Header de la App */
        .app-header {
            padding: 40px 25px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-profile { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); padding: 2px; }
        .user-info h2 { font-family: 'Cinzel', serif; font-size: 0.9rem; letter-spacing: 2px; }
        .user-info p { font-size: 0.6rem; text-transform: uppercase; color: var(--primary); font-weight: 700; }

        /* Pantalla de Inicio (Splash) */
        #splash-screen {
            position: fixed;
            inset: 0;
            background: #fff;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 1s cubic-bezier(0.8, 0, 0.2, 1);
        }

        .loader-circle {
            width: 80px; height: 80px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid var(--primary);
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .btn-enter {
            padding: 15px 40px;
            border: 1px solid var(--primary);
            background: transparent;
            font-family: 'Cinzel', serif;
            letter-spacing: 4px;
            cursor: pointer;
            margin-top: 30px;
            transition: 0.3s;
        }

        /* Mensajes Deslizantes (Cards) */
        #message-card {
            position: absolute;
            top: 45%; left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 85%; max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 30px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #message-card.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        .quote-icon { font-size: 3rem; color: var(--primary); opacity: 0.3; font-family: 'serif'; }
        .main-msg { font-family: 'Playfair Display', serif; font-size: 1.6rem; line-height: 1.4; margin: 20px 0; }

        /* Barra de Navegación inferior (Estilo iOS) */
        .bottom-nav {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            height: 70px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 35px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 10px 30px rgba(138, 109, 59, 0.15);
        }

        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: #999; font-size: 0.6rem; font-weight: 600; text-transform: uppercase;
            cursor: pointer; transition: 0.3s;
        }

        .nav-item.active { color: var(--primary); }
        .nav-dot { width: 5px; height: 5px; background: var(--primary); border-radius: 50%; margin-top: 5px; opacity: 0; }
        .nav-item.active .nav-dot { opacity: 1; }

        /* Barra de Progreso Circular para el Soplido */
        .breath-indicator {
            position: absolute;
            top: -25px;
            background: white;
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 1px;
        }

        /* Bóveda de Recuerdos */
        #vault-screen {
            position: fixed; inset: 0; background: white; z-index: 2000;
            padding: 40px 20px; display: none; overflow-y: auto;
        }

    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="loader-circle"></div>
        <h1 style="font-family: 'Cinzel'; font-size: 1.2rem; letter-spacing: 5px;">Kiara Universe</h1>
        <p style="font-size: 0.7rem; color: #999; margin-top: 10px;">PROYECTADO POR JHOAN BORGES</p>
        <button class="btn-enter" onclick="startApp()">INICIAR EXPERIENCIA</button>
    </div>

    <div id="app-interface">
        <header class="app-header">
            <div class="user-profile">
                <div class="avatar" style="background: url('https://cdn-icons-png.flaticon.com/512/3667/3667231.png') center/cover;"></div>
                <div class="user-info">
                    <h2>Kiara</h2>
                    <p id="status-text">Explorando el Jardín</p>
                </div>
            </div>
            <div class="stats-icon" style="text-align: right;">
                <p style="font-size: 0.5rem; letter-spacing: 1px;">SECRETOS</p>
                <p id="counter" style="font-weight: 800; color: var(--primary);">0/10</p>
            </div>
        </header>

        <div id="message-card">
            <div class="quote-icon">“</div>
            <p id="text-reveal" class="main-msg"></p>
            <p style="font-size: 0.7rem; color: var(--primary); letter-spacing: 2px;">GOLDEN HOUR</p>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('garden')">
                <span>Jardín</span>
                <div class="nav-dot"></div>
            </div>
            <div class="nav-item" onclick="switchTab('vault')">
                <span>Bóveda</span>
                <div class="nav-dot"></div>
            </div>
            
            <div id="breath-hint" class="breath-indicator">SOPLA SUAVE</div>
        </nav>
    </div>

    <div id="vault-screen">
        <h2 style="font-family: 'Cinzel'; margin-bottom: 30px; text-align: center;">Tus Secretos Guardados</h2>
        <div id="vault-list" style="display: grid; gap: 15px;"></div>
        <button class="btn-enter" style="width: 100%;" onclick="switchTab('garden')">VOLVER AL JARDÍN</button>
    </div>

    <script>
        let petals = [], flowers = [], sparks = [];
        let mic, started = false, progress = 0;
        let isRevealing = false, petalImg;
        let revealedIndexes = JSON.parse(localStorage.getItem('kiara_vault') || "[]");

        const SECRETS = [
            "Tal como dice la canción de Golden Hour, no necesito ninguna luz para verte brillar. Es tu hora dorada. Tú desaceleras el tiempo en tu hora dorada",
            "Tu risa es la frecuencia más hermosa de este universo",
            "Eres el color más brillante en mi día más gris",
            "Gracias por elegirme para caminar a tu lado",
            "Cada soplido en este jardín es un suspiro mío por ti",
            "Tú no eres una opción, eres mi prioridad absoluta",
            "Incluso en silencio, tu alma dice cosas hermosas",
            "Eres el 'te amo' más sincero que he pronunciado",
            "Mi paz mental tiene tu nombre escrito",
            "Eres mi hogar, sin importar dónde estemos"
        ];

        function setup() {
            let canvas = createCanvas(windowWidth, windowHeight);
            canvas.style('position', 'fixed');
            canvas.style('top', '0');
            canvas.style('z-index', '1');

            petalImg = createGraphics(40, 40);
            petalImg.noStroke();
            for(let r = 40; r > 0; r -= 4) {
                petalImg.fill(212, 160, 23, 100 + r*2);
                petalImg.ellipse(20, 20, r/1.8, r);
            }

            for (let i = 0; i < 350; i++) petals.push(new Petal());
            for (let i = 0; i < 8; i++) flowers.push(new Flower(i * (width/7)));
            for (let i = 0; i < 40; i++) sparks.push(new Spark());
            
            document.getElementById('counter').innerText = `${revealedIndexes.length}/${SECRETS.length}`;
        }

        function startApp() {
            userStartAudio().then(() => {
                mic = new p5.AudioIn();
                mic.start();
                started = true;
                document.getElementById('splash-screen').style.transform = 'translateY(-100%)';
                document.getElementById('app-interface').classList.add('active');
            });
        }

        function draw() {
            clear();
            if (!started) return;

            let vol = mic.getLevel();
            let blowing = vol > 0.04;
            let force = map(vol, 0.04, 0.5, 0, 40);

            if (!isRevealing) {
                if (blowing) {
                    progress += 1.5;
                    document.getElementById('breath-hint').innerText = "SOPLANDO...";
                    if (progress >= 100) revealSecret();
                } else {
                    progress = max(0, progress - 0.5);
                    document.getElementById('breath-hint').innerText = "SOPLA SUAVE";
                }
            }

            for (let s of sparks) s.update();
            for (let f of flowers) f.update(force);
            let t = frameCount * 0.006;
            for (let p of petals) {
                p.applyWind(blowing, force, t);
                p.update();
                p.display();
            }
        }

        function revealSecret() {
            isRevealing = true;
            let available = SECRETS.map((_, i) => i).filter(i => !revealedIndexes.includes(i));
            if (available.length === 0) available = [Math.floor(random(SECRETS.length))];
            
            let idx = random(available);
            if(!revealedIndexes.includes(idx)) {
                revealedIndexes.push(idx);
                localStorage.setItem('kiara_vault', JSON.stringify(revealedIndexes));
            }
            
            showMsg(SECRETS[idx]);
        }

        function showMsg(txt) {
            const card = document.getElementById('message-card');
            const textEl = document.getElementById('text-reveal');
            textEl.innerText = txt;
            card.classList.add('show');
            document.getElementById('counter').innerText = `${revealedIndexes.length}/${SECRETS.length}`;
            
            setTimeout(() => {
                card.classList.remove('show');
                setTimeout(() => { isRevealing = false; progress = 0; }, 1000);
            }, 9000);
        }

        function switchTab(tab) {
            const gardenHud = document.getElementById('breath-hint');
            const vault = document.getElementById('vault-screen');
            
            if(tab === 'vault') {
                vault.style.display = 'block';
                renderVault();
            } else {
                vault.style.display = 'none';
            }
            
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.toggle('active', el.innerText.toLowerCase().includes(tab));
            });
        }

        function renderVault() {
            const list = document.getElementById('vault-list');
            list.innerHTML = "";
            revealedIndexes.forEach(idx => {
                let div = document.createElement('div');
                div.style.cssText = "padding: 20px; background: #fdfaf0; border-radius: 15px; border-left: 4px solid var(--primary); font-size: 0.9rem; font-family: 'Playfair Display';";
                div.innerText = `"${SECRETS[idx]}"`;
                list.appendChild(div);
            });
        }

        // --- Clases de Física ---
        class Petal {
            constructor() { this.reset(true); }
            reset(full) {
                this.pos = createVector(random(width), full ? random(height) : -40);
                this.vel = createVector(random(-1, 1), random(1, 2.5));
                this.acc = createVector(0, 0);
                this.angle = random(TWO_PI);
                this.rotS = random(-0.03, 0.03);
                this.size = random(0.3, 0.7);
                this.off = random(1000);
            }
            applyWind(blowing, f, t) {
                let n = noise(this.pos.x * 0.003, this.pos.y * 0.003, t + this.off);
                this.acc.add(createVector(map(n, 0, 1, -0.3, 0.3), 0.02));
                if (blowing) this.acc.add(createVector(random(-2, 2), -f * 0.6));
            }
            update() {
                this.vel.add(this.acc);
                this.vel.limit(3.5);
                this.pos.add(this.vel);
                this.acc.mult(0);
                this.angle += this.rotS;
                if (this.pos.y > height + 40) this.reset(false);
            }
            display() {
                push(); translate(this.pos.x, this.pos.y); rotate(this.angle); scale(this.size);
                image(petalImg, -20, -20); pop();
            }
        }

        class Flower {
            constructor(x) { this.x = x; this.h = random(150, 250); this.ph = random(PI); this.ang = 0; }
            update(f) {
                this.ang = lerp(this.ang, sin(frameCount*0.015 + this.ph)*0.2 + f*0.02, 0.05);
                push(); translate(this.x, height); rotate(this.ang);
                stroke(60, 80, 40); strokeWeight(5); line(0,0,0,-this.h);
                translate(0, -this.h); noStroke();
                fill(255, 215, 0); for(let i=0; i<10; i++){ push(); rotate(i*PI/5); ellipse(18, 0, 35, 14); pop(); }
                fill(80, 60, 30); circle(0, 0, 20); pop();
            }
        }

        class Spark {
            constructor() { this.p = createVector(random(width), random(height)); this.o = random(100); }
            update() {
                let b = map(sin(frameCount*0.04 + this.o), -1, 1, 0, 180);
                noStroke(); fill(255, 255, 255, b); circle(this.p.x, this.p.y, random(1, 3));
            }
        }

        function windowResized() { resizeCanvas(windowWidth, windowHeight); }
        function mouseMoved() { if(started) sparks.push(new Spark(mouseX, mouseY)); }
    </script>
</body>
</html>
