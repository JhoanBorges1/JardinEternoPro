<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cosmic Orb - Kiara</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@100;300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --space-bg: radial-gradient(circle at center, #0a0e1a 0%, #030406 100%);
            --orb-core: #fff5cc;
            --orb-glow: rgba(212, 160, 23, 0.6);
            --orb-energy: rgba(255, 215, 0, 0.4);
            --text-color: #f0f0f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--space-bg);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            font-family: 'Montserrat', sans-serif;
            color: var(--text-color);
            user-select: none;
            touch-action: none;
        }

        /* --- El Orbe Central (Glassmorphism + Física) --- */
        #orb-container {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #the-orb {
            position: relative;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, var(--orb-core) 0%, rgba(255, 255, 255, 0.1) 60%, transparent 100%);
            border-radius: 50%;
            box-shadow: 0 0 50px var(--orb-glow),
                        0 0 100px var(--orb-energy);
            cursor: pointer;
            transition: transform 0.3s ease-out, box-shadow 0.3s ease;
            animation: orb-float 6s infinite ease-in-out, orb-rotate 20s infinite linear;
        }

        #the-orb::before {
            content: '';
            position: absolute;
            inset: -10px;
            background: radial-gradient(circle at center, transparent 30%, var(--orb-energy) 70%, transparent 100%);
            border-radius: 50%;
            filter: blur(15px);
            opacity: 0.5;
        }

        #the-orb:active {
            transform: scale(1.1);
            box-shadow: 0 0 70px #fff,
                        0 0 150px var(--orb-energy);
        }

        /* Animaciones del Orbe */
        @keyframes orb-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        @keyframes orb-rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Órbitas de Luz */
        .orbit-particle {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            opacity: 0.2;
            pointer-events: none;
        }

        /* --- Interfaz Cinemática (Mensajes) --- */
        #ui-layer {
            position: fixed;
            inset: 0;
            z-index: 100;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
        }

        /* Mensaje de Constelación */
        #message-display {
            width: 85%;
            max-width: 600px;
            opacity: 0;
            filter: blur(15px);
            transition: opacity 1.5s ease-out, filter 1.5s ease-out, transform 1.5s ease-out;
            transform: scale(0.9);
            z-index: 101;
        }
        #message-display.visible {
            opacity: 1;
            filter: blur(0px);
            transform: scale(1);
        }

        .space-text {
            font-size: 1.8rem;
            font-weight: 100;
            line-height: 1.6;
            text-shadow: 0 0 15px rgba(255,255,255,0.5);
            font-style: italic;
        }

        .from-jhoan {
            font-size: 0.6rem;
            color: rgba(255,255,255,0.3);
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: 40px;
            font-weight: 300;
        }

        /* HUD Minimalista */
        .hud {
            position: absolute;
            bottom: 40px;
            font-size: 0.6rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.3;
            pointer-events: auto;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="orb-container">
        <div id="the-orb"></div>
        </div>

    <div id="ui-layer">
        <div id="message-display">
            <p class="space-text" id="main-text"></p>
            <p class="from-jhoan">— Proyecto Kiara —</p>
        </div>
        <div class="hud" onclick="rotateMessages()">Toca el orbe o aquí para leer el cielo</div>
    </div>

    <script>
        // --- BASE DE DATOS DE PENSAMIENTOS CÓSMICOS ---
        const ALL_MESSAGES = [
            "Para mí siempre has sido tú, desde el principio.",
            "Llevamos tiempo que no hablamos ☺️ pero siempre estás presente.",
            "Me gusta que me digas así ☺️ (tarroncito de miel)",
            "Aproveché hoy que estaba libre para pensar en ti...",
            "Me alegra mucho verte feliz, eso es lo que más importa.",
            "Cada vez que veo una foto tuya me sacas una sonrisa.",
            "Eres mi lugar seguro, Kiara.",
            "No importa el tiempo que pase, siempre serás mi persona favorita.",
            "Tu sonrisa ilumina mi cielo más que todas estas estrellas juntas.",
            "Eres el deseo que pedí y que se hizo realidad.",
            "Te amo de aquí al infinito pasando por cada galaxia.",
            "Siempre has querido que sea yo, y yo siempre he querido que seas tú.",
            "Me gusta cómo me haces sentir cuando hablamos.",
            "Contigo el mundo se ve mucho mejor.",
            "Eres mi cómplice en todo.",
            "Eres luz en mis días más oscuros.",
            "Te amo con toda mi alma y mi ser."
        ];

        let messagePool = [...ALL_MESSAGES];
        let currentIdx = -1;
        let particles = [];

        // --- INICIALIZACIÓN DEL UNIVERSO ---
        function initCosmos() {
            const container = document.getElementById('orb-container');
            const particleCount = window.innerWidth < 768 ? 50 : 100;

            for (let i = 0; i < particleCount; i++) {
                const p = document.createElement('div');
                p.className = 'orbit-particle';
                const size = Math.random() * 2 + 1; // 1px a 3px
                p.style.width = `${size}px`;
                p.style.height = `${size}px`;
                
                // Propiedades físicas para la animación
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 150 + 100; // Radio de la órbita
                const speed = Math.random() * 0.02 + 0.005;
                
                p.dataset.angle = angle;
                p.dataset.distance = distance;
                p.dataset.speed = speed;

                container.appendChild(p);
                particles.push(p);
            }

            requestAnimationFrame(animateParticles);
        }

        // --- MOTOR DE FÍSICA DE PARTÍCULAS ---
        function animateParticles() {
            for (let p of particles) {
                let angle = parseFloat(p.dataset.angle);
                const distance = parseFloat(p.dataset.distance);
                const speed = parseFloat(p.dataset.speed);
                
                // Actualizar ángulo
                angle += speed;
                p.dataset.angle = angle;
                
                // Calcular nueva posición (Órbita elíptica sutil)
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance * 0.7; // Elipse chata
                
                // Efecto de profundidad (Parallax)
                const depth = Math.sin(angle);
                const scale = map(depth, -1, 1, 0.5, 1.2);
                const alpha = map(depth, -1, 1, 0.1, 0.4);
                
                p.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
                p.style.opacity = alpha;
                p.style.zIndex = depth > 0 ? 5 : 15; // Unas pasan por detrás, otras por delante
            }
            requestAnimationFrame(animateParticles);
        }

        // --- LÓGICA DE MENSAJES (Ciclo Infinito) ---
        function getNextMessage() {
            currentIdx = (currentIdx + 1) % ALL_MESSAGES.length;
            return ALL_MESSAGES[currentIdx];
        }

        function rotateMessages() {
            const textReveal = document.getElementById('message-display');
            const mainText = document.getElementById('main-text');
            const orb = document.getElementById('the-orb');
            
            const message = getNextMessage();
            
            // Ocultar mensaje anterior (con blur)
            textReveal.classList.remove('visible');
            
            // Efecto visual en el Orbe
            orb.style.boxShadow = `0 0 100px #fff, 0 0 200px var(--orb-energy)`;
            
            setTimeout(() => {
                mainText.innerText = `“${message}”`;
                textReveal.classList.add('visible');
                // Volver a la luz normal del orbe
                orb.style.boxShadow = `0 0 50px var(--orb-glow), 0 0 100px var(--orb-energy)`;
            }, 1000); // Tiempo para que se desvanezca el anterior
        }

        // --- INTERACCIÓN Y MOVIMIENTO (Parallax) ---
        const map = (n, start1, stop1, start2, stop2) => {
            return ((n - start1) / (stop1 - start1)) * (stop2 - start2) + start2;
        };

        // Asignar eventos al orbe
        document.getElementById('the-orb').addEventListener('click', rotateMessages);
        document.getElementById('the-orb').addEventListener('touchstart', (e) => {
            e.preventDefault();
            rotateMessages();
        });

        // --- INICIAR ---
        window.addEventListener('load', initCosmos);

    </script>
</body>
</html>
