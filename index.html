<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deep Space - Kiara</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --space-bg: #000205; /* Negro casi absoluto */
            --star-core: #ffffff;
            --star-glow: rgba(255, 255, 255, 0.9);
            --nebula-blue: rgba(20, 40, 100, 0.1);
            --nebula-purple: rgba(80, 20, 80, 0.08);
            --text-color: #f0f0f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--space-bg);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            font-family: 'Montserrat', sans-serif;
            color: var(--text-color);
            user-select: none;
            touch-action: none;
        }

        /* --- El Motor del Universo (Canvas) --- */
        #deep-space-canvas {
            position: absolute;
            inset: 0;
            z-index: 1;
            filter: blur(0.5px); /* Suavizado sutil para realismo */
        }

        /* --- Interfaz Cinemática (Overlays) --- */
        #ui-layer {
            position: fixed;
            inset: 0;
            z-index: 100;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
        }

        /* Mensaje de Constelación */
        #message-display {
            width: 85%;
            max-width: 650px;
            opacity: 0;
            filter: blur(15px) scale(0.9);
            transition: opacity 2s cubic-bezier(0.4, 0, 0.2, 1), 
                        filter 2s cubic-bezier(0.4, 0, 0.2, 1),
                        transform 2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 101;
        }
        #message-display.visible {
            opacity: 1;
            filter: blur(0px) scale(1.05);
            transform: scale(1.05);
        }

        .space-text {
            font-size: 2rem;
            font-weight: 100; /* Peso extra fino */
            line-height: 1.6;
            text-shadow: 0 0 20px rgba(255,255,255,0.7),
                         0 0 40px rgba(255,255,255,0.4);
            letter-spacing: 1px;
        }

        .from-jhoan {
            font-size: 0.65rem;
            color: rgba(255,255,255,0.3);
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: 40px;
            font-weight: 300;
        }

        /* HUD Minimalista */
        .hud {
            position: absolute;
            bottom: 40px;
            font-size: 0.6rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.2;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <canvas id="deep-space-canvas"></canvas>

    <div id="ui-layer">
        <div id="message-display">
            <p class="space-text" id="main-text"></p>
            <p class="from-jhoan">— Deep Space Kiara —</p>
        </div>
        <div class="hud">Mueve el cielo para descubrir sus mensajes</div>
    </div>

    <script>
        // --- BASE DE DATOS DE PENSAMIENTOS CÓSMICOS ---
        const ALL_MESSAGES = [
            "Para mí siempre has sido tú, desde el principio.",
            "Llevamos tiempo que no hablamos ☺️ pero siempre estás presente.",
            "Me gusta que me digas así ☺️ (tarroncito de miel)",
            "Aproveché hoy que estaba libre para pensar en ti...",
            "Me alegra mucho verte feliz, eso es lo que más importa.",
            "Cada vez que veo una foto tuya me sacas una sonrisa.",
            "Eres mi lugar seguro, Kiara.",
            "No importa el tiempo que pase, siempre serás mi persona favorita.",
            "Tu sonrisa ilumina mi cielo más que todas estas estrellas juntas.",
            "Eres el deseo que pedí y que se hizo realidad.",
            "Te amo de aquí al infinito pasando por cada galaxia.",
            "Siempre has querido que sea yo, y yo siempre he querido que seas tú.",
            "Me gusta cómo me haces sentir cuando hablamos.",
            "Contigo el mundo se ve mucho mejor.",
            "Eres mi cómplice en todo.",
            "Eres luz en mis días más oscuros.",
            "Te amo con toda mi alma y mi ser."
        ];

        let messagePool = [...ALL_MESSAGES];
        let currentIdx = -1;
        let canvas, ctx;
        let stars = [], dust = [];
        let mouseX = 0, mouseY = 0;

        // --- MOTOR FOTORREALISTA ---
        function initDeepSpace() {
            canvas = document.getElementById('deep-space-canvas');
            ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // 1. Generar Polvo Cósmico (Irregular)
            for (let i = 0; i < 2000; i++) {
                dust.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 0.7,
                    alpha: Math.random() * 0.3,
                    color: `rgba(200, 220, 255, ${Math.random() * 0.2})` // Tinte azul sutil
                });
            }

            // 2. Generar Estrellas Principales (Variadas)
            for (let i = 0; i < 150; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5 + 0.2, // 0.2px a 1.7px
                    glow: Math.random() * 15 + 5,
                    twinkleSpeed: Math.random() * 0.05 + 0.01,
                    twinklePhase: Math.random() * Math.PI * 2,
                    brightness: Math.random() * 0.5 + 0.5 // 0.5 a 1.0
                });
            }

            // Iniciar ciclo de renderizado
            requestAnimationFrame(renderSpace);
        }

        // --- CICLO DE RENDERIZADO (El secreto del fotorrealismo) ---
        function renderSpace(time) {
            // Fondo de espacio profundo
            ctx.fillStyle = '#000103'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Aplicar Nebulosas Volumétricas (Gradientes complejos con blend mode)
            ctx.globalCompositeOperation = 'lighter';
            
            // Nebulosa Azul
            let gradBlue = ctx.createRadialGradient(canvas.width * 0.3, canvas.height * 0.3, 0, canvas.width * 0.3, canvas.height * 0.3, canvas.width * 0.6);
            gradBlue.addColorStop(0, 'rgba(20, 40, 100, 0.08)');
            gradBlue.addColorStop(1, 'transparent');
            ctx.fillStyle = gradBlue;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Nebulosa Púrpura
            let gradPurp = ctx.createRadialGradient(canvas.width * 0.8, canvas.height * 0.7, 0, canvas.width * 0.8, canvas.height * 0.7, canvas.width * 0.5);
            gradPurp.addColorStop(0, 'rgba(80, 20, 80, 0.06)');
            gradPurp.addColorStop(1, 'transparent');
            ctx.fillStyle = gradPurp;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.globalCompositeOperation = 'source-over';

            // Dibujar Polvo Estelar (Parallax suave)
            let moveX = mouseX * 0.003;
            let moveY = mouseY * 0.003;
            for (let p of dust) {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.alpha;
                ctx.beginPath();
                ctx.arc(p.x + moveX, p.y + moveY, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1.0;

            // Dibujar Estrellas Principales (Twinkle orgánico y Glow)
            let starMoveX = mouseX * 0.01; // Parallax más fuerte
            let starMoveY = mouseY * 0.01;
            for (let s of stars) {
                let twinkle = Math.sin(time * s.twinkleSpeed + s.twinklePhase) * 0.3 + 0.7;
                let currentBrightness = s.brightness * twinkle;
                
                // Halo de la estrella (Glow)
                ctx.shadowBlur = s.glow * twinkle;
                ctx.shadowColor = `rgba(255, 255, 255, ${currentBrightness})`;
                ctx.fillStyle = `rgba(255, 255, 255, ${currentBrightness})`;
                
                ctx.beginPath();
                ctx.arc(s.x + starMoveX, s.y + starMoveY, s.size * twinkle, 0, Math.PI * 2);
                ctx.fill();
                
                // Reset shadow para no afectar el resto
                ctx.shadowBlur = 0;
            }

            requestAnimationFrame(renderSpace);
        }

        // --- LÓGICA DE MENSAJES (Ciclo Infinito) ---
        function getNextMessage() {
            currentIdx = (currentIdx + 1) % ALL_MESSAGES.length;
            return ALL_MESSAGES[currentIdx];
        }

        function rotateMessages() {
            const textReveal = document.getElementById('message-display');
            const mainText = document.getElementById('main-text');
            
            const message = getNextMessage();
            
            // Ocultar mensaje anterior (con blur)
            textReveal.classList.remove('visible');
            
            setTimeout(() => {
                mainText.innerText = `“${message}”`;
                textReveal.classList.add('visible');
            }, 2000); // Tiempo para que se desvanezca el anterior
        }

        // --- INTERACCIÓN Y MOVIMIENTO (Parallax) ---
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX - window.innerWidth / 2;
            mouseY = e.clientY - window.innerHeight / 2;
        });

        // Táctil para móvil
        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            mouseX = touch.clientX - window.innerWidth / 2;
            mouseY = touch.clientY - window.innerHeight / 2;
        }, { passive: true });

        // Cambiar mensaje al tocar/clicar en cualquier parte
        window.addEventListener('click', (e) => {
            // Evitar que el clic en el HUD dispare el mensaje si tuviéramos botones
            if (e.target.closest('.hud')) return;
            rotateMessages();
        });
        window.addEventListener('touchstart', (e) => {
            if (e.target.closest('.hud')) return;
            rotateMessages();
        });

        // --- INICIAR ---
        window.addEventListener('load', () => {
            initDeepSpace();
            // Mostrar el primer mensaje automáticamente
            setTimeout(rotateMessages, 1000);
        });

        window.addEventListener('resize', () => {
            if(canvas) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                // Podríamos regenerar las estrellas, pero es mejor dejarlas así para no "parpadear"
            }
        });
    </script>
</body>
</html>
