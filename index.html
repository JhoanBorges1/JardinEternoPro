<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deep Universe - Kiara</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,100;1,200&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000205; /* El negro del espacio profundo */
            color: white;
            font-family: 'Montserrat', sans-serif;
            cursor: crosshair;
        }

        #canvas-container {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        /* Capa de atmósfera y mensajes */
        #interface {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 100%);
        }

        #message-box {
            width: 80%;
            max-width: 600px;
            text-align: center;
            opacity: 0;
            filter: blur(20px);
            transition: all 2.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #message-box.active {
            opacity: 1;
            filter: blur(0px);
            transform: scale(1.05);
        }

        .text-cosmico {
            font-size: 1.8rem;
            font-weight: 100;
            letter-spacing: 2px;
            line-height: 1.6;
            text-shadow: 0 0 15px rgba(255,255,255,0.4);
            font-style: italic;
        }

        .hint {
            position: absolute;
            bottom: 40px;
            font-size: 0.6rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            opacity: 0.3;
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <canvas id="spaceCanvas"></canvas>
    </div>

    <div id="interface">
        <div id="message-box">
            <p id="main-text" class="text-cosmico"></p>
        </div>
        <div class="hint">Toca el vacío para conectar con ella</div>
    </div>

    <script>
        const canvas = document.getElementById('spaceCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let stars = [], clouds = [];
        let mouse = { x: 0, y: 0, active: false };

        const MESSAGES = [
            "Para mí siempre has sido tú, desde el principio.",
            "Llevamos tiempo que no hablamos ☺️ pero siempre estás presente.",
            "Me gusta que me digas así ☺️ (tarroncito de miel)",
            "Aproveché hoy que estaba libre para pensar en ti...",
            "Me alegra mucho verte feliz, eso es lo que más importa.",
            "Cada vez que veo una foto tuya me sacas una sonrisa.",
            "Eres mi lugar seguro, Kiara.",
            "Tu sonrisa ilumina mi cielo más que todas estas estrellas.",
            "Te amo de aquí al infinito pasando por cada galaxia."
        ];
        let msgIdx = 0;

        function init() {
            resize();
            createSpace();
            animate();
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function createSpace() {
            // Estrellas con diferentes temperaturas (colores reales)
            const colors = ['#ffffff', '#fff4ea', '#f8fbff', '#fdf2ff', '#fffdfe'];
            for(let i=0; i<400; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    z: Math.random() * width,
                    size: Math.random() * 1.2 + 0.1,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    twinkle: Math.random() * 0.02
                });
            }

            // Nubes de gas (Nebulosas realistas con degradados irregulares)
            for(let i=0; i<5; i++) {
                clouds.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    r: Math.random() * width * 0.8 + 200,
                    color: i % 2 === 0 ? 'rgba(20, 30, 80, 0.04)' : 'rgba(60, 20, 60, 0.03)'
                });
            }
        }

        function drawNebula() {
            ctx.globalCompositeOperation = 'screen';
            clouds.forEach(c => {
                let g = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, c.r);
                g.addColorStop(0, c.color);
                g.addColorStop(1, 'transparent');
                ctx.fillStyle = g;
                ctx.fillRect(0,0,width,height);
            });
            ctx.globalCompositeOperation = 'source-over';
        }

        function animate() {
            // El secreto del realismo: No limpiar el canvas a negro puro, 
            // dejar un rastro mínimo para suavizar el movimiento.
            ctx.fillStyle = '#000205';
            ctx.fillRect(0, 0, width, height);

            drawNebula();

            stars.forEach(s => {
                // Parallax 3D
                let x = (s.x - width/2) * (width/s.z) + width/2;
                let y = (s.y - height/2) * (width/s.z) + height/2;
                let size = (1 - s.z/width) * s.size * 2;
                
                // Efecto de parpadeo realista
                let b = Math.sin(Date.now() * s.twinkle) * 0.5 + 0.5;
                ctx.fillStyle = s.color;
                ctx.globalAlpha = b;
                
                // Dibujo de estrella con "glow" sutil
                ctx.beginPath();
                ctx.arc(x + (mouse.x * 0.02), y + (mouse.y * 0.02), size, 0, Math.PI*2);
                ctx.fill();

                // Movimiento hacia adelante
                s.z -= 0.3;
                if(s.z <= 0) s.z = width;
            });

            ctx.globalAlpha = 1;
            requestAnimationFrame(animate);
        }

        function showMessage() {
            const box = document.getElementById('message-box');
            const text = document.getElementById('main-text');
            
            box.classList.remove('active');
            
            setTimeout(() => {
                text.innerText = MESSAGES[msgIdx];
                msgIdx = (msgIdx + 1) % MESSAGES.length;
                box.classList.add('active');
            }, 1000);
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousedown', showMessage);
        window.addEventListener('touchstart', (e) => {
            e.preventDefault();
            showMessage();
        });
        
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX - width/2;
            mouse.y = e.clientY - height/2;
        });

        init();
    </script>
</body>
</html>
