<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Hour - Kiara</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@1,400;1,700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/addons/p5.sound.min.js"></script>
    
    <style>
        :root {
            --gold-light: #fff5cc;
            --gold-main: #d4a017;
            --gold-deep: #8a6d3b;
            --sunset: linear-gradient(180deg, #fffae5 0%, #ffe4b5 50%, #ffd194 100%);
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: var(--sunset);
            font-family: 'Quicksand', sans-serif;
            user-select: none;
        }

        /* Capa de iluminación ambiental */
        #ambient-light {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% -20%, rgba(255, 230, 100, 0.3) 0%, transparent 80%);
            pointer-events: none;
            z-index: 10;
        }

        /* Contenedor de mensajes cinemáticos */
        #message-view {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 700px;
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }

        .message-text {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--gold-deep);
            opacity: 0;
            filter: blur(15px);
            transform: scale(0.9);
            transition: all 2.5s cubic-bezier(0.4, 0, 0.2, 1);
            text-shadow: 2px 2px 15px rgba(255, 255, 255, 0.5);
        }

        .message-text.visible {
            opacity: 1;
            filter: blur(0px);
            transform: scale(1.05);
        }

        /* HUD elegante */
        .hud {
            position: absolute;
            bottom: 50px;
            width: 100%;
            text-align: center;
            z-index: 150;
            transition: opacity 1s;
        }

        .instruction {
            color: var(--gold-deep);
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .progress-track {
            width: 150px;
            height: 2px;
            background: rgba(138, 109, 59, 0.1);
            margin: 0 auto;
            border-radius: 5px;
            overflow: hidden;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--gold-main);
            box-shadow: 0 0 10px var(--gold-main);
            transition: width 0.4s;
        }
    </style>
</head>
<body>

    <div id="ambient-light"></div>
    
    <div id="message-view">
        <div id="text-reveal" class="message-text"></div>
    </div>

    <div id="hud" class="hud">
        <div class="instruction">Respira sobre el jardín</div>
        <div class="progress-track">
            <div id="progress-bar"></div>
        </div>
    </div>

</body>
</html>
