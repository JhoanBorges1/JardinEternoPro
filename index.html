<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Hour - Kiara</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@1,400;1,700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/addons/p5.sound.min.js"></script>
    
    <style>
        :root {
            --gold-light: #fff5cc;
            --gold-main: #d4a017;
            --gold-deep: #8a6d3b;
            --sunset: linear-gradient(180deg, #fffae5 0%, #ffe4b5 50%, #ffd194 100%);
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: var(--sunset);
            font-family: 'Quicksand', sans-serif;
            user-select: none;
            touch-action: none;
        }

        #starter-btn {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid var(--gold-main);
            color: var(--gold-deep);
            font-family: 'Cinzel', serif;
            letter-spacing: 5px;
            cursor: pointer;
            z-index: 2000;
            transition: all 0.8s ease;
            text-transform: uppercase;
        }

        #starter-btn:hover {
            background: var(--gold-main);
            color: white;
            box-shadow: 0 0 30px rgba(212, 160, 2, 0.4);
        }

        #ambient-light {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% -20%, rgba(255, 230, 100, 0.3) 0%, transparent 80%);
            pointer-events: none;
            z-index: 10;
        }

        #message-view {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 700px;
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }

        .message-text {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--gold-deep);
            opacity: 0;
            filter: blur(15px);
            transform: scale(0.9);
            transition: all 2.5s cubic-bezier(0.4, 0, 0.2, 1);
            text-shadow: 2px 2px 15px rgba(255, 255, 255, 0.5);
        }

        .message-text.visible {
            opacity: 1;
            filter: blur(0px);
            transform: scale(1.05);
        }

        .hud {
            position: absolute;
            bottom: 50px;
            width: 100%;
            text-align: center;
            z-index: 150;
            transition: opacity 1s;
        }

        .instruction {
            color: var(--gold-deep);
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .progress-track {
            width: 150px;
            height: 2px;
            background: rgba(138, 109, 59, 0.1);
            margin: 0 auto;
            border-radius: 5px;
            overflow: hidden;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--gold-main);
            box-shadow: 0 0 10px var(--gold-main);
            transition: width 0.4s;
        }
    </style>
</head>
<body>

    <button id="starter-btn" onclick="initPro()">Entrar al Atardecer</button>

    <div id="ambient-light"></div>
    
    <div id="message-view">
        <div id="text-reveal" class="message-text"></div>
    </div>

    <div id="hud" class="hud" style="opacity: 0;">
        <div class="instruction">Respira sobre el jardín</div>
        <div class="progress-track">
            <div id="progress-bar"></div>
        </div>
    </div>

    <script>
        let petals = [], flowers = [], sparks = [];
        let mic, started = false, progress = 0;
        let isRevealing = false, petalImg;
        let revealedIndexes = [];

        const GOLDEN_HOUR_IDX = 0; 
        const SECRETS = [
            "Tal como dice la canción de Golden Hour, no necesito ninguna luz para verte brillar. Es tu hora dorada. Tú desaceleras el tiempo en tu hora dorada",
            "Tu risa es el mejor soplido de vida que conozco",
            "En este jardín, tú eres la única flor que nunca se marchita",
            "Gracias por ser mi paz en los días de tormenta",
            "Cada pétalo es un «te amo» que el viento te lleva",
            "Tú no solo ves la luz, tú la creas",
            "Eres mi recordatorio diario de que la vida es bonita",
            "Un mundo sin tu amarillo sería un mundo en blanco y negro",
            "Me encanta cómo eres: sin filtros, solo tú",
            "Eres el secreto mejor guardado de este jardín"
        ];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            petalImg = createGraphics(30, 30);
            petalImg.noStroke();
            for(let r = 30; r > 0; r -= 2) {
                petalImg.fill(255, 215, 0, 150);
                petalImg.ellipse(15, 15, r/1.5, r);
            }

            for (let i = 0; i < 400; i++) petals.push(new Petal());
            for (let i = 0; i < 12; i++) flowers.push(new Flower(i * (width/11)));
            for (let i = 0; i < 40; i++) sparks.push(new Spark());
        }

        function initPro() {
            userStartAudio().then(() => {
                mic = new p5.AudioIn();
                mic.start();
                started = true;
                document.getElementById('starter-btn').style.opacity = '0';
                setTimeout(() => document.getElementById('starter-btn').style.display = 'none', 1000);
                document.getElementById('hud').style.opacity = '1';
            });
        }

        function draw() {
            clear();
            if (!started) return;

            let vol = mic.getLevel();
            let blowing = vol > 0.05;
            let force = map(vol, 0.05, 0.4, 0, 35);

            if (!isRevealing) {
                if (blowing) {
                    progress += 1.2;
                    if (progress >= 100) revealSecret();
                } else {
                    progress = max(0, progress - 0.4);
                }
                document.getElementById('progress-bar').style.width = progress + "%";
            }

            for (let i = sparks.length - 1; i >= 0; i--) {
                sparks[i].update();
                if (sparks[i].life <= 0) sparks.splice(i, 1);
            }
            
            for (let f of flowers) f.update(force);
            
            let t = frameCount * 0.005;
            for (let p of petals) {
                p.applyWind(blowing, force, t);
                p.update();
                p.display();
            }
        }

        function revealSecret() {
            isRevealing = true;
            let available = SECRETS.filter((_, i) => !revealedIndexes.includes(i));
            if (available.length === 0) revealedIndexes = [];
            
            let randomIdx;
            do { randomIdx = floor(random(SECRETS.length)); } while (revealedIndexes.includes(randomIdx));
            revealedIndexes.push(randomIdx);
            
            let displayTime = (randomIdx === GOLDEN_HOUR_IDX) ? 12000 : 8000;
            showMsg(SECRETS[randomIdx], displayTime);
        }

        function showMsg(txt, time) {
            let view = document.getElementById('text-reveal');
            view.innerText = txt;
            view.classList.add('visible');
            document.getElementById('hud').style.opacity = '0';
            
            setTimeout(() => {
                view.classList.remove('visible');
                setTimeout(() => {
                    isRevealing = false;
                    progress = 0;
                    document.getElementById('hud').style.opacity = '1';
                }, 2500);
            }, time);
        }

        function mouseMoved() {
            if(started && frameCount % 2 == 0) {
                sparks.push(new Spark(mouseX, mouseY));
            }
        }

        function touchMoved() {
            if(started) {
                sparks.push(new Spark(mouseX, mouseY));
            }
            return false;
        }

        class Petal {
            constructor() { this.reset(true); }
            reset(full) {
                this.pos = createVector(random(width), full ? random(height) : -30);
                this.vel = createVector(random(-0.5, 0.5), random(1, 2));
                this.acc = createVector(0, 0);
                this.angle = random(TWO_PI);
                this.rotS = random(-0.02, 0.02);
                this.size = random(0.4, 0.8);
                this.off = random(1000);
            }
            applyWind(blowing, f, t) {
                let n = noise(this.pos.x * 0.002, this.pos.y * 0.002, t + this.off);
                this.acc.add(createVector(map(n, 0, 1, -0.2, 0.2), 0.02));
                if (blowing) this.acc.add(createVector(random(-1, 1), -f * 0.5));
            }
            update() {
                this.vel.add(this.acc);
                this.vel.limit(3);
                this.pos.add(this.vel);
                this.acc.mult(0);
                this.angle += this.rotS;
                if (this.pos.y > height + 20) this.reset(false);
            }
            display() {
                push();
                translate(this.pos.x, this.pos.y);
                rotate(this.angle);
                scale(this.size);
                image(petalImg, -15, -15);
                pop();
            }
        }

        class Flower {
            constructor(x) { 
                this.x = x; 
                this.h = random(120, 220); 
                this.ph = random(PI); 
                this.ang = 0; 
            }
            update(f) {
                this.ang = lerp(this.ang, sin(frameCount*0.015 + this.ph)*0.15 + f*0.02, 0.05);
                push();
                translate(this.x, height);
                rotate(this.ang);
                stroke(40, 60, 20); strokeWeight(4); line(0,0,0,-this.h);
                stroke(80, 120, 60); strokeWeight(2); line(0,0,0,-this.h);
                translate(0, -this.h);
                noStroke();
                fill(255, 200, 0);
                for(let i=0; i<8; i++){
                    push(); rotate(i*PI/4); ellipse(15, 0, 30, 12); pop();
                }
                fill(60, 40, 20); circle(0, 0, 15);
                pop();
            }
        }

        class Spark {
            constructor(x, y) {
                this.p = createVector(x || random(width), y || random(height));
                this.v = createVector(random(-1,1), random(-1,1));
                this.life = 255;
            }
            update() {
                this.p.add(this.v);
                this.life -= 4;
                noStroke(); 
                fill(255, 255, 255, this.life); 
                circle(this.p.x, this.p.y, random(1, 4));
            }
        }

        function windowResized() { resizeCanvas(windowWidth, windowHeight); }
    </script>
</body>
</html>
